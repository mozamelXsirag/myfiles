    <link rel="icon" href="https://raw.githubusercontent.com/mozamelXsirag/myfiles/main/logo.svg" type="image/svg+xml">

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link id="bootstrap-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        /* المتغيرات اللونية الأساسية */
        :root {
            --bg-color: #F5ECDC;
            --card-bg: #FCF4E6;
            --text-dark: #4a3b2c;
            --text-gray: #8a7763;
            --primary-color: #b58d60;
            --white: #ffffff;
            --border-light: #ebdcc8;
            --hover-bg: #f2e5d3;
            --badge-bg: #b58d60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            font-family: 'IBM Plex Sans Arabic', sans-serif !important;
            transition: direction 0.3s ease; /* تأثير انتقال عند تغيير الاتجاه */
        }

        a { text-decoration: none; color: inherit; }
        a:hover { color: inherit; }

        /* ------------------ الشريط العلوي (Header) ------------------ */
        header {
            background-color: transparent;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 15px 0;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .logo img {
            height: 45px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            /* الهوامش تتغير حسب الاتجاه عبر CSS منطقي */
            margin-inline-end: 40px; 
        }

        .nav-links a {
            font-size: 0.95rem;
            color: var(--text-gray);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-color);
        }

        .lang-switch {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* --- ستايل القائمة المنسدلة للغات --- */
        .custom-dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-menu-custom {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: var(--white);
            min-width: 200px; /* زيادة عرض القائمة المنسدلة */
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); /* ظل أنعم وأكثر أناقة */
            border: 1px solid var(--border-light); /* حد خفيف جداً */
            border-radius: 8px;
            z-index: 1000;
            list-style: none;
            padding: 8px 0;
            margin-top: 12px;
        }
        [dir="rtl"] .dropdown-menu-custom {
            right: auto;
            left: 0;
        }
        .dropdown-menu-custom.show {
            display: block;
            animation: fadeInDown 0.2s ease-out; /* تأثير ظهور سلس */
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-menu-custom li {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-dark);
            transition: all 0.2s ease;
            text-align: left;
            white-space: nowrap; /* ✅ هذا السطر يمنع انكسار النص لسطرين */
            border-inline-start: 4px solid transparent; /* تمهيد لتأثير اللغة المحددة */
        }
        [dir="rtl"] .dropdown-menu-custom li {
            text-align: right;
        }
        .dropdown-menu-custom li:hover {
            background-color: var(--hover-bg);
            color: var(--primary-color);
            padding-inline-start: 25px; /* إزاحة جمالية بسيطة عند تمرير الماوس */
        }
        
        /* تأثير اللغة الحالية (Current/Active) */
        .dropdown-menu-custom li.active {
            background-color: var(--card-bg);
            color: var(--primary-color);
            font-weight: 700;
            border-inline-start-color: var(--primary-color);
        }

        /* ------------------ القسم الرئيسي (Hero Section) ------------------ */
        .hero {
            text-align: center;
            padding: 80px 0 70px;
        }

        .hero-img {
            max-width: 100%;
            width: 450px;
            height: auto;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-bottom: 25px;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .badge {
            background-color: var(--badge-bg);
            color: var(--white);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* حاوية المحتوى (Main Content Card) ------------------ */
        .content-container {
            margin-bottom: 50px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            padding: 30px;
        }

        /* شريط التحكم (البحث) */
        .controls-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: var(--bg-color);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 8px 15px;
            width: 350px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            padding: 8px 10px;
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
        }

        .search-box i {
            color: var(--text-gray);
            background-color: var(--primary-color);
            color: white;
            padding: 10px 12px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* ------------------ شبكة اللغات (Languages Grid) ------------------ */
        .languages-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .lang-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-item:hover {
            border-color: #cdd6e0;
            background-color: var(--hover-bg);
        }

        .lang-info-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lang-text {
            display: flex;
            flex-direction: column;
        }

        .lang-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dark);
        }

        .lang-edition {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-top: 4px;
        }

        .lang-code {
            background-color: var(--hover-bg);
            color: var(--primary-color);
            font-weight: 800;
            font-size: 1.1rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        /* ------------------ التصميم المتجاوب (Responsive) ------------------ */
        @media (max-width: 900px) {
            .nav-links { display: none; }
            .header-right .fa-bars {
                display: block !important;
                margin-inline-start: 15px;
                color: var(--primary-color);
                font-size: 1.2rem;
                cursor: pointer;
            }
        }

        @media (max-width: 768px) {
            .content-container {
                padding: 20px;
                margin-bottom: 30px;
            }
            .controls-bar {
                flex-direction: column;
                gap: 15px;
            }
            .search-box {
                width: 100%;
                order: -1;
            }
            .languages-grid {
                grid-template-columns: 1fr;
            }
            .hero-img {
                width: 90%;
            }
            .hero {
                padding: 50px 0 40px;
            }
        }

        .mobile-menu-icon { display: none; }

        /* ------------------ التذييل (Footer) ------------------ */
        footer {
            text-align: center;
            padding: 25px 0;
            margin-top: 20px;
            border-top: 1px solid var(--border-light);
            color: var(--text-gray);
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>

    <script>
        // تعريف متغيرات مسار الترجمات
        let currentLang = 'en';

        // دالة جلب الترجمة وتطبيقها
        async function loadTranslations(lang) {
            try {
                // محاولة جلب الملف (سيعمل عند رفعه على استضافة حقيقية)
                // سيقوم بجلب ar.json, en.json, fr.json ... الخ بناءً على الاختيار
                const response = await fetch(`${lang}.json`);
                if (!response.ok) throw new Error('File not found');
                const translations = await response.json();
                applyTranslations(translations, lang);
            } catch (error) {
                console.warn(`تعذر جلب ملف ${lang}.json خارج بيئة الاستضافة. سيتم استخدام النسخة الاحتياطية المدمجة لأغراض المعاينة.`, error);
                
                // نسخة احتياطية للعمل محلياً أو في بيئة المعاينة (Canvas) لجميع اللغات الستة
                if (lang === 'ar') {
                    applyTranslations(fallbackArTranslations, lang);
                } else if (lang === 'ur') {
                    applyTranslations(fallbackUrTranslations, lang);
                } else if (lang === 'fr') {
                    applyTranslations(fallbackFrTranslations, lang);
                } else if (lang === 'ky') {
                    applyTranslations(fallbackKyTranslations, lang);
                } else if (lang === 'id') {
                    applyTranslations(fallbackIdTranslations, lang);
                } else {
                    // استخدام الإنجليزية كافتراضي
                    applyTranslations(fallbackEnTranslations, lang);
                }
            }
        }

        // دالة حقن الترجمات في العناصر
        function applyTranslations(translations, lang) {
            // 1. تحديث اتجاه ولغة الصفحة
            document.documentElement.lang = lang;
            const isRtl = ['ar', 'ur'].includes(lang);
            document.documentElement.dir = isRtl ? 'rtl' : 'ltr';

            // 2. تحديث مكتبة Bootstrap بناءً على الاتجاه
            const bootstrapLink = document.getElementById('bootstrap-css');
            if (isRtl) {
                bootstrapLink.href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css";
            } else {
                bootstrapLink.href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css";
            }

            // 3. حقن النصوص داخل العناصر باستخدام data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) {
                    if (el.tagName === 'TITLE') {
                        document.title = translations[key];
                    } else {
                        el.innerHTML = translations[key];
                    }
                }
            });

            // 4. حقن نصوص الـ placeholder
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[key]) {
                    el.placeholder = translations[key];
                }
            });

            // 5. حقن نصوص الـ alt للصور
            document.querySelectorAll('[data-i18n-alt]').forEach(el => {
                const key = el.getAttribute('data-i18n-alt');
                if (translations[key]) {
                    el.alt = translations[key];
                }
            });

            // إعادة تشغيل فلترة البحث في حال تم تغيير لغة الموقع أثناء وجود نص في حقل البحث
            filterLanguages();
        }

        // كود تشغيل الترجمة عند تحميل الصفحة (تحديد الإنجليزية كافتراضي)
        document.addEventListener('DOMContentLoaded', () => {
            loadTranslations(currentLang);
            updateDropdownUI(currentLang);

            // إضافة مستمع الأحداث (Event Listener) لحقل البحث
            const searchInput = document.getElementById('searchInput');
            if(searchInput) {
                searchInput.addEventListener('input', filterLanguages);
            }
        });

        // ==========================================
        // ميزة البحث في اللغات
        // ==========================================
        function filterLanguages() {
            const searchInput = document.getElementById('searchInput');
            if(!searchInput) return;
            
            // جلب النص المُدخل وتحويله لأحرف صغيرة لتسهيل المطابقة (Case-insensitive)
            const searchTerm = searchInput.value.toLowerCase().trim();
            const langItems = document.querySelectorAll('.lang-item');

            langItems.forEach(item => {
                // جلب اسم اللغة ورمزها من داخل البطاقة
                const langName = item.querySelector('.lang-name').textContent.toLowerCase();
                const langCode = item.querySelector('.lang-code').textContent.toLowerCase();

                // التحقق مما إذا كان اسم اللغة أو الرمز يحتوي على النص المدخل
                if (langName.includes(searchTerm) || langCode.includes(searchTerm)) {
                    item.style.display = 'flex'; // إظهار البطاقة
                } else {
                    item.style.display = 'none'; // إخفاء البطاقة
                }
            });
        }

        // دوال القائمة المنسدلة للغات
        function toggleDropdown() {
            document.getElementById("langDropdown").classList.toggle("show");
        }

        // إغلاق القائمة عند النقر في أي مكان آخر بالصفحة
        window.onclick = function(event) {
            if (!event.target.closest('.custom-dropdown')) {
                var dropdowns = document.getElementsByClassName("dropdown-menu-custom");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        // دالة تغيير اللغة
        function changeLanguage(lang) {
            if (currentLang !== lang) {
                currentLang = lang;
                loadTranslations(currentLang);
                updateDropdownUI(currentLang);
            }
            document.getElementById("langDropdown").classList.remove("show");
        }

        // دالة تحديث تأثير اللغة الحالية في القائمة
        function updateDropdownUI(lang) {
            const items = document.querySelectorAll('#langDropdown li');
            items.forEach(item => {
                if (item.getAttribute('data-lang') === lang) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
